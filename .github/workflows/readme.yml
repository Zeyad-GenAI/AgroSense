name: Generate README
on:
  push:
    branches:
      - master

# هذه الصلاحيات تسمح للـ Action بتعديل الملفات وعمل Commit و Push
permissions:
  contents: write

jobs:
  generate-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Generate README via OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python -c "
          import os, requests, json
          
          files_structure = []
          for root, dirs, files in os.walk('.'):
              if '.git' in root or '.github' in root: continue
              for f in files:
                  files_structure.append(os.path.join(root, f))
          
          structure_str = '\n'.join(files_structure[:100])
          
          prompt = f'Generate a professional GitHub README.md file for a project with the following file structure:\n{structure_str}\n\nProvide ONLY the raw markdown content, no extra talk or markdown code blocks wraps.'
          
          headers = {
              'Authorization': f'Bearer {os.environ[\"OPENROUTER_API_KEY\"]}',
              'Content-Type': 'application/json'
          }
          
          data = {
              'model': 'google/gemini-2.5-flash:free',
              'messages': [{'role': 'user', 'content': prompt}]
          }
          
          response = requests.post('https://openrouter.ai/api/v1/chat/completions', headers=headers, json=data)
          res_json = response.json()
          
          if 'choices' in res_json:
              readme_content = res_json['choices'][0]['message']['content']
              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(readme_content)
              print('README generated successfully!')
          else:
              print('Error from API:', res_json)
              exit(1)
          "

      - name: Commit and Push README
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "docs: auto generate README.md via Gemini" || echo "No changes to commit"
          git push origin master
